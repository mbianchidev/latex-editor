services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: latex-editor-frontend
    ports:
      - "${LATEX_EDITOR_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - latex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latex-editor-backend
    expose:
      - "5000"
    environment:
      - DEBUG=false
      - PORT=5000
      - DB_PATH=/data/projects.db
      - COMPILE_TIMEOUT_SECONDS=${COMPILE_TIMEOUT_SECONDS:-60}
      - MAX_REQUEST_BYTES=${MAX_REQUEST_BYTES:-36700160}
      - MAX_COMPILE_BYTES=${MAX_COMPILE_BYTES:-26214400}
      - GITHUB_TOKEN_ENCRYPTION_KEY=${GITHUB_TOKEN_ENCRYPTION_KEY:-}
      - GITHUB_TOKEN_KEY_PATH=${GITHUB_TOKEN_KEY_PATH:-}
    volumes:
      - ${LATEX_EDITOR_DATA:-${HOME}/.latex-editor/data}:/data
    networks:
      - latex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  latex-network:
    driver: bridge
